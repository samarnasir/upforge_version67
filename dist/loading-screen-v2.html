<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Site</title>
<style>

/* ─── LOADER ───────────────────────────────────────────── */
#loader {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100vh;
  background: #0a0e1a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  overflow: hidden;
  font-family: 'Arial Black', 'Impact', sans-serif;
}

.word-wrap {
  text-align: center;
  width: 100%;
  padding: 0 24px;
  line-height: 1;
}

.word {
  display: block;
  font-weight: 900;
  letter-spacing: -0.02em;
  text-transform: uppercase;
  opacity: 0;
  will-change: transform, opacity, filter;
  line-height: 0.88;
}

#w-we-hate {
  font-size: clamp(36px, 8vw, 100px);
  color: #ffffff;
  transform: translateY(-40px) scale(2.2);
  filter: blur(8px);
}
#w-traditional {
  font-size: clamp(28px, 6.5vw, 82px);
  color: #2563ff; /* ← your brand blue */
  transform: scale(0.15) rotate(-6deg);
  filter: blur(6px);
}
#w-consulting {
  font-size: clamp(36px, 8vw, 100px);
  color: #ffffff;
  transform: translateY(40px) scale(2.2);
  filter: blur(8px);
}

.word.in { opacity: 1; filter: blur(0); }
#w-we-hate.in     { transform: translateY(-6px); }
#w-traditional.in { transform: scale(1) rotate(0deg); }
#w-consulting.in  { transform: translateY(6px); }

.shake     { animation: sk-top 0.16s cubic-bezier(.36,.07,.19,.97) both; }
.shake-mid { animation: sk-mid 0.18s cubic-bezier(.36,.07,.19,.97) both; }
.shake-bot { animation: sk-bot 0.16s cubic-bezier(.36,.07,.19,.97) both; }

@keyframes sk-top {
  20%,80% { transform: translateY(-6px) translateX( 5px); }
  40%,60% { transform: translateY(-6px) translateX(-5px); }
  100%    { transform: translateY(-6px); }
}
@keyframes sk-mid {
  20%,80% { transform: scale(1) translateX(-5px) rotate(-1.5deg); }
  40%,60% { transform: scale(1) translateX( 5px) rotate( 1.5deg); }
  100%    { transform: scale(1) rotate(0deg); }
}
@keyframes sk-bot {
  20%,80% { transform: translateY(6px) translateX(-5px); }
  40%,60% { transform: translateY(6px) translateX( 5px); }
  100%    { transform: translateY(6px); }
}

/* Progress bar */
.bar-wrap {
  position: absolute;
  bottom: 36px;
  left: 50%;
  transform: translateX(-50%);
  width: min(360px, 70vw);
}
.bar-meta {
  display: flex;
  justify-content: space-between;
  font-family: 'Arial', sans-serif;
  font-size: 9px;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.25);
  text-transform: uppercase;
  margin-bottom: 7px;
}
.bar-track {
  width: 100%;
  height: 2px;
  background: rgba(255,255,255,0.08);
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  width: 0%;
  background: #2563ff;
  transition: width 0.3s ease;
}

/* Exit fade */
#loader.exiting {
  transition: opacity 0.55s ease;
  opacity: 0;
  pointer-events: none;
}

/* ─── YOUR SITE ─────────────────────────────────────────── */
/* The hero and rest of page sit below #loader in stacking   */
/* context and appear the moment #loader fades out.          */
#hero {
  /* Your existing hero styles go here */
  min-height: 100vh;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
}

</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════
     LOADER  — paste this block at the very top of <body>
═══════════════════════════════════════════════════════ -->
<div id="loader">
  <div class="word-wrap">
    <span class="word" id="w-we-hate">We Hate</span>
    <span class="word" id="w-traditional">Traditional</span>
    <span class="word" id="w-consulting">Consulting</span>
  </div>

  <div class="bar-wrap">
    <div class="bar-meta">
      <span id="bar-status">Loading</span>
      <span id="bar-pct">0%</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" id="bar-fill"></div>
    </div>
  </div>
</div>
<!-- end loader -->


<!-- ═══════════════════════════════════════════════════════
     YOUR WEBSITE CONTENT BELOW
═══════════════════════════════════════════════════════ -->
<section id="hero">
  <!-- Replace with your real hero section -->
  <p style="font-size:24px;color:#0a0e1a;">Your hero content here</p>
</section>


<script>
/* ── helpers ── */
const wh        = document.getElementById('w-we-hate');
const wt        = document.getElementById('w-traditional');
const wc        = document.getElementById('w-consulting');
const barFill   = document.getElementById('bar-fill');
const barPct    = document.getElementById('bar-pct');
const barStatus = document.getElementById('bar-status');
const loader    = document.getElementById('loader');

function setBar(pct, label) {
  const v = Math.min(100, Math.round(pct));
  barFill.style.width = v + '%';
  barPct.textContent  = v + '%';
  if (label) barStatus.textContent = label;
}

function slam(el, shakeClass) {
  return new Promise(res => {
    el.style.transition = 'opacity 0.14s ease, transform 0.24s cubic-bezier(0.22,1,0.36,1), filter 0.22s ease';
    el.classList.add('in');
    el.addEventListener('transitionend', () => {
      el.classList.add(shakeClass);
      setTimeout(() => el.classList.remove(shakeClass), 200);
      res();
    }, { once: true });
  });
}

const wait = ms => new Promise(r => setTimeout(r, ms));

/* ── word animation (plays immediately, not gated on load) ── */
async function animate() {
  await wait(200);
  await slam(wh, 'shake');      setBar(33);            await wait(280);
  await slam(wc, 'shake-bot');  setBar(55);            await wait(240);
  await slam(wt, 'shake-mid');  setBar(72);
}

/* ── real page-load tracker ── */
function waitForPageLoad() {
  return new Promise(res => {
    /* already fully loaded (e.g. cached page) */
    if (document.readyState === 'complete') { res(); return; }
    window.addEventListener('load', res, { once: true });
  });
}

function trackResources() {
  /* Uses PerformanceObserver to reflect actual network activity */
  return new Promise(res => {
    const loadDone = waitForPageLoad();

    if (!window.PerformanceObserver) { loadDone.then(res); return; }

    const observer = new PerformanceObserver(list => {
      const all = performance.getEntriesByType('resource').filter(
        r => ['img','css','script','fetch','xmlhttprequest','other'].includes(r.initiatorType)
      );
      if (!all.length) return;
      const done = all.filter(r => r.responseEnd > 0).length;
      const pct  = 72 + Math.round((done / all.length) * 25);
      setBar(Math.min(97, pct), 'Loading assets');
    });

    try { observer.observe({ type: 'resource', buffered: true }); } catch(e) {}
    loadDone.then(() => { observer.disconnect(); res(); });
  });
}

/* ── main ── */
async function run() {
  const animDone  = animate();
  const loadDone  = trackResources();

  /* wait for BOTH the word animation AND the real load to finish */
  await Promise.all([animDone, loadDone]);

  setBar(100, 'Ready');
  await wait(380);

  loader.classList.add('exiting');
  await wait(600);
  loader.style.display = 'none';
}

run();
</script>
</body>
</html>
